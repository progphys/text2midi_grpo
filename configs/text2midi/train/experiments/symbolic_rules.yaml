experiment: "symbolic_rules"
description: "GRPO with conditioned symbolic and musical-health rewards only"

lora:
  target_modules: ["to_qkv", "to_out", "linear1", "linear2"]
  layers_to_transform: null

prompt:
  num_prompts_per_step: 4

reward:
  key_weight: 0.03
  rhythm_weight: 0.10
  key_conditioned_weight: 0.12
  key_exact_weight: 0.08
  key_relative_weight: 0.08
  meter_weight: 0.10
  tempo_weight: 0.04
  tempo_bin_weight: 0.04
  tempo_bin_tolerant_weight: 0.04
  duration_balance_weight: 0.05
  note_density_weight: 0.05
  pitch_range_weight: 0.04
  pitch_diversity_weight: 0.04
  polyphony_balance_weight: 0.04
  duration_variety_weight: 0.04
  stepwise_motion_weight: 0.04
  repetition_balance_weight: 0.04
  observer_weight: 0.0
  invalid_enabled: false
  observer_critic:
    enabled: false
    project_midi: true
    device: cpu
    checkpoint_path: supplementary/critic_assets/observer_fixed_pairs/last.pt
    projected_output_dir: outputs/observer_projected_fixed_pairs
