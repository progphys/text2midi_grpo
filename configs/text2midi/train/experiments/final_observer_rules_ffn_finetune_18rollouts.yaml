experiment: "final_observer_rules_ffn_finetune_18rollouts"
description: "Final-observer GRPO with FFN finetuning, critic-aligned prompts, and light key/meter/tempo rule guardrails"

adaptation:
  mode: ffn
  trainable_modules: ["linear1", "linear2"]

prompt:
  num_prompts_per_step: 4
  preset: final_observer_aligned

grpo:
  num_rollouts: 18
  rollout_max_len: 1200
  generation_chunk_size: 18
  update_mini_batch: 18
  kl_ceiling: 1.5

training:
  lr: 1.0e-5
  lr_scheduler:
    enabled: true
    type: cosine
    warmup_steps: 13
    min_lr: 3.0e-6

reward:
  key_weight: 0.0
  rhythm_weight: 0.0
  key_conditioned_weight: 0.0
  key_exact_weight: 0.0
  key_relative_weight: 0.0
  meter_weight: 0.0
  tempo_weight: 0.0
  tempo_bin_weight: 0.0
  tempo_bin_tolerant_weight: 0.04
  key_profile_weight: 0.10
  meter_template_weight: 0.06
  duration_balance_weight: 0.0
  note_density_weight: 0.0
  pitch_range_weight: 0.0
  pitch_diversity_weight: 0.0
  polyphony_balance_weight: 0.0
  duration_variety_weight: 0.0
  stepwise_motion_weight: 0.0
  repetition_balance_weight: 0.0
  observer_weight: 0.80
  invalid_enabled: false
  observer_critic:
    enabled: true
    project_midi: true
    device: auto
    reward_signal: pairwise_win_rate
    script_path: src/core/critics/final_observer/infer.py
    checkpoint_path: supplementary/critic_assets/final_observer/best.pt
    projected_output_dir: outputs/final_observer_projected_rules
