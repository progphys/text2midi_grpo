experiment: "final_observer_only_last2_attn_ffn_finetune_30rollouts"
description: "Critic-only GRPO with final_observer and direct attention+FFN finetuning only in the last 2 decoder layers, 30 rollout candidates per prompt"

adaptation:
  mode: ffn
  trainable_modules: ["to_qkv", "to_out", "linear1", "linear2"]
  trainable_layer_indices: [16, 17]

prompt:
  num_prompts_per_step: 4

grpo:
  num_rollouts: 30
  rollout_max_len: 1200
  generation_chunk_size: 30
  update_mini_batch: 30
  kl_ceiling: 1.5

training:
  lr: 6.0e-6
  lr_scheduler:
    enabled: true
    type: cosine
    warmup_steps: 13
    min_lr: 2.0e-6

reward:
  key_weight: 0.0
  rhythm_weight: 0.0
  key_conditioned_weight: 0.0
  key_exact_weight: 0.0
  key_relative_weight: 0.0
  meter_weight: 0.0
  tempo_weight: 0.0
  tempo_bin_weight: 0.0
  tempo_bin_tolerant_weight: 0.0
  duration_balance_weight: 0.0
  note_density_weight: 0.0
  pitch_range_weight: 0.0
  pitch_diversity_weight: 0.0
  polyphony_balance_weight: 0.0
  duration_variety_weight: 0.0
  stepwise_motion_weight: 0.0
  repetition_balance_weight: 0.0
  observer_weight: 1.0
  observer_critic:
    enabled: true
    project_midi: false
    device: auto
    reward_signal: pairwise_win_rate
    checkpoint_path: supplementary/critic_assets/final_observer/best.pt
    projected_output_dir: outputs/observer_projected_final
