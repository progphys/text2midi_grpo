defaults:
  - model: teacher_gnn_base
  - data: teacher_encoded_full
  - dataloader: theory_aware_extended
  - training: default
  - optimizer: adamw
  - scheduler: none
  - losses: teacher_ssl
  - experiment: one_batch_debug
  - hydra: default
  - _self_

project:
  name: Fine-tune-text2midi-llm-with-gnn-theory-critic
  task: teacher_ssl_training

run_name: ${experiment.name}_${model.name}_hybrid_smoke
seed: ${training.seed}
device: ${training.device}

data:
  split:
    train: train
    val: train

dataloader:
  # Для one-batch теста делаем батч минимальным и детерминированным.
  batch_size: 2
  shuffle: false

  # В one-batch режиме удобно фиксировать коррапшен для повторяемого дебага.
  theory_aware:
    deterministic_per_sample: true
    deterministic_seed: 123


training:
  limit_train_samples: 16
  limit_val_samples: 16
  epochs: 1

model:
  pooling_mode: mean_max
  use_hybrid_graph_scorer: true
  local_summary_use_mean: true
  local_summary_use_max: true
  local_summary_use_topk_mean: true
  local_summary_topk: 3
