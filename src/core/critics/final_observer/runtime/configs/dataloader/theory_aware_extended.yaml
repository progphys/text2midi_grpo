batch_size: 2
num_workers: 0
shuffle: true
pin_memory: false
drop_last: false
mask_prob: 0.15
mask_min_nodes: 1
optional_mask_field_prob: 0.5

# Переключает источник коррапшена: graph (старый) или song_theory (новые theory-aware коррапшены на уровне песни).
corruption_backend: song_theory

theory_aware:
  strongbeat_min_duration: 1.0
  strongbeat_only: true
  rhythm_shift_max_steps: 2
  balance_mode_usage: true

  # Если true, для каждого idx в датасете коррапшен воспроизводится одинаково между запусками.
  deterministic_per_sample: false
  # Базовый seed для deterministic_per_sample (итоговый seed = deterministic_seed + idx).
  deterministic_seed: 0
  corruption_family_weights: {}
  corruption_mode_weights: {}

corruption_modes:
  # Меняет местами две соседние секции.
  - adjacent_section_swap
  # Меняет местами две несоседние секции.
  - non_adjacent_section_swap
  # Дублирует секцию один или несколько раз.
  - section_duplicate
  # Удаляет секцию, оставляя на ее месте тишину.
  - section_drop_keep_silence
  # Удаляет секцию и закрывает временной разрыв.
  - section_drop_and_close_gap
  # Заменяет первый аккорд секции на не-тоническую функцию.
  - section_entry_non_tonic_substitution
  # Заменяет последний аккорд секции на не-доминантовую функцию.
  - section_exit_non_dominant_substitution
  # Меняет ноту на сильной доле так, чтобы она перестала быть аккордовым тоном.
  - strongbeat_nonchord_note
  # Подставляет ноту, конфликтующую с borrowed-ладом аккорда.
  - borrowed_melody_conflict
  # Переключает borrowed атрибуты аккорда без изменения мелодии.
  - borrowed_kind_toggle_without_melody_change
  # Добавляет аккордовую надстройку, которая звучит в полутоне от одновременно звучащей мелодии.
  - melody_semitone_add_clash
  # Переводит аккорд в sus, когда мелодия продолжает утверждать терцию или конфликтует с новой suspension.
  - melody_suspension_clash
  # Добавляет altered-tone в аккорд так, чтобы он был в полутоне от мелодии.
  - melody_alteration_clash
  # Убирает терцию или квинту из аккорда, когда мелодия как раз опирается на этот core tone.
  - melody_omit_core_tone_conflict
  # Меняет inversion так, чтобы implied bass хуже связывался с соседними аккордами.
  - inversion_bass_continuity_conflict
  # Сдвигает onset ноты на соседние позиции по ритмической сетке.
  - note_onset_shift
  # Сдвигает onset аккорда на соседнюю позицию, ломая синхронизацию гармонии и мелодии.
  - chord_onset_shift
