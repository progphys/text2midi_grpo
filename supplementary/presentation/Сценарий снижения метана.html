<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Сценарий ограничения метана</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f8; color: #111; }
    .page { padding: 18px 18px 26px; }
    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    .controls button { padding: 8px 14px; border: 1px solid #ccc; background: white; border-radius: 8px; cursor: pointer; }
    .controls input[type=range] { flex: 1 1 380px; }
    .vars { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .var-card { background: white; border-radius: 10px; padding: 10px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .var-name { font-size: 12px; color: #666; margin-bottom: 6px; }
    .var-value { font-size: 18px; font-weight: 600; }
    .top-plots { display: grid; grid-template-columns: repeat(2, minmax(360px, 1fr)); gap: 14px; align-items: stretch; margin-bottom: 16px; }
    .plot-card { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .plot-title { font-size: 14px; font-weight: 600; margin: 4px 8px 10px; }
    .plot-box { width: 100%; height: 460px; }
    @media (max-width: 1400px) { .top-plots { grid-template-columns: 1fr; } }
  
    .top-banner-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 0 0 16px 0;
    }
    .top-banner {
      width: min(900px, 75vw);
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

  </style>
</head>

let timer = null;

function fmt(v) { if (v === null || v === undefined || Number.isNaN(v)) return '—'; if (typeof v === 'number') return v.toFixed(3); return String(v); }
function renderVars(frame) {

}
function baseLayout(yTitle, yRange) {

}
function dualLayout(leftTitle, leftRange, rightTitle, rightRange) {
  return {margin: {l: 60, r: 70, t: 10, b: 80}, legend: {orientation: 'h', y: -0.28, x: 0}, xaxis: {title: 't, h', rangemode: 'tozero'}, yaxis: {title: leftTitle, range: leftRange}, yaxis2: {title: rightTitle, overlaying: 'y', side: 'right', range: rightRange}};
}
function renderFrame(idx) {
  const frame = payload.frames[idx];
